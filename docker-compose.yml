services:
  mysql:
    image: mysql:8.0
    container_name: badminton_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - badminton_network

  redis:
    image: redis:7-alpine
    container_name: badminton_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - badminton_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: badminton_backend:latest
    container_name: badminton_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${PORT:-8080}
      CLIENT_URL: ${CLIENT_URL:?CLIENT_URL is required}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:?DB_USER is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: ${DB_NAME:?DB_NAME is required}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_ACCESS_EXPIRE: ${JWT_ACCESS_EXPIRE:-1h}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_REFRESH_EXPIRE: ${JWT_REFRESH_EXPIRE:-7d}
      EMAIL_USER: ${EMAIL_USER:?EMAIL_USER is required}
      EMAIL_PASS: ${EMAIL_PASS:?EMAIL_PASS is required}
      CLOUD_NAME: ${CLOUD_NAME:?CLOUD_NAME is required}
      API_KEY: ${API_KEY:?API_KEY is required}
      API_SECRET: ${API_SECRET:?API_SECRET is required}
      VNP_TMN_CODE: ${VNP_TMN_CODE:?VNP_TMN_CODE is required}
      VNP_HASH_SECRET: ${VNP_HASH_SECRET:?VNP_HASH_SECRET is required}
      VNP_URL: ${VNP_URL:?VNP_URL is required}
      VNP_RETURN_URL: ${VNP_RETURN_URL:?VNP_RETURN_URL is required}
      VNP_IPN_URL: ${VNP_IPN_URL:-}
      GHN_BASE_URL: ${GHN_BASE_URL:?GHN_BASE_URL is required}
      GHN_TOKEN_DEV: ${GHN_TOKEN_DEV:?GHN_TOKEN_DEV is required}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      OPENAI_API_URL: ${OPENAI_API_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_TEMPERATURE: ${OPENAI_TEMPERATURE:-0.7}
      OPENAI_MAX_TOKENS: ${OPENAI_MAX_TOKENS:-2048}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://127.0.0.1:8080/health'', r => process.exit(r.statusCode === 200 ? 0 : 1)).on(''error'', () => process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - badminton_network

  worker:
    image: badminton_backend:latest
    container_name: badminton_worker
    restart: unless-stopped
    command: ["npm", "run", "worker"]
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:?DB_USER is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: ${DB_NAME:?DB_NAME is required}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      disable: true
    networks:
      - badminton_network

  migrate:
    image: badminton_backend:latest
    container_name: badminton_migrate
    command: ["npm", "run", "migrate"]
    profiles:
      - tools
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:?DB_USER is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: ${DB_NAME:?DB_NAME is required}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - badminton_network

  seed:
    image: badminton_backend:latest
    container_name: badminton_seed
    command: ["npm", "run", "seed"]
    profiles:
      - tools
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:?DB_USER is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: ${DB_NAME:?DB_NAME is required}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - badminton_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-/api}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-}
    image: badminton_frontend:latest
    container_name: badminton_frontend
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - badminton_network

  nginx:
    image: nginx:1.27-alpine
    container_name: badminton_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/app.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - badminton_network

volumes:
  mysql_data:
  redis_data:

networks:
  badminton_network:
    driver: bridge
